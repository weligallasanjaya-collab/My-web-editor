<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control | Pro Publisher</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBhht8EBXClI_eBWADCKHPGCywnir1bRiE",
          authDomain: "bluepanda-ai.firebaseapp.com",
          projectId: "bluepanda-ai",
          storageBucket: "bluepanda-ai.firebasestorage.app",
          messagingSenderId: "778830127801",
          appId: "1:778830127801:web:4ac3d72ae7e2ae6fe33168"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.checkLogin = function() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(email.includes("@") && pass.length >= 4) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
            } else { alert("Login Error."); }
        };

        // --- UPLOAD WITH PROGRESS BAR ---
        window.publishSite = async function() {
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            const statusText = document.getElementById('status-text');
            const viewBtn = document.getElementById('view-live-btn');

            progressContainer.style.display = 'block';
            viewBtn.style.display = 'none';
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                progressBar.style.width = progress + "%";
                statusText.innerText = "Uploading to Cloud: " + progress + "%";
                
                if(progress >= 100) clearInterval(interval);
            }, 150);

            const data = {
                title: document.getElementById('edit-title').value,
                image: document.getElementById('edit-image').value,
                video: document.getElementById('edit-video').value,
                text: document.getElementById('edit-text').value,
            };

            try {
                await setDoc(doc(db, "clientSites", "mainSite"), data);
                setTimeout(() => {
                    statusText.innerText = "✅ UPLOAD SUCCESSFUL!";
                    statusText.style.color = "#22c55e";
                    viewBtn.style.display = 'block';
                }, 1600);
            } catch (e) {
                statusText.innerText = "❌ UPLOAD FAILED: " + e.message;
                statusText.style.color = "#ef4444";
            }
        };

        window.logoutAndDelete = async function() {
            if(confirm("DELETE EVERYTHING?")) {
                await deleteDoc(doc(db, "clientSites", "mainSite"));
                location.reload();
            }
        };

        window.clearBox = (id) => { document.getElementById(id).value = ""; };
    </script>
    <style>
        :root { --blue: #38bdf8; --gold: #fbbf24; --dark: #020617; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 2px solid var(--blue); border-radius: 20px; padding: 20px; box-shadow: 0 0 15px var(--blue); }
        .input-group { position: relative; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; background: #111827; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        .del-btn { position: absolute; right: 10px; top: 12px; color: #ef4444; border: none; background: none; cursor: pointer; font-weight: bold; }
        .main-btn { width: 100%; padding: 15px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .publish-btn { background: var(--gold); color: black; }
        .view-btn { background: #22c55e; color: white; display: none; }
        .logout-btn { background: #450a0a; color: #f87171; border: 1px solid #991b1b; font-size: 0.8rem; }
        
        /* Progress Bar Styling */
        #progress-container { display: none; margin: 20px 0; background: #111827; height: 10px; border-radius: 5px; overflow: hidden; border: 1px solid #334155; }
        #progress-bar { width: 0%; height: 100%; background: var(--blue); transition: width 0.2s; box-shadow: 0 0 10px var(--blue); }
        #status-text { text-align: center; font-size: 0.9rem; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen" class="container" style="margin-top:20vh; text-align:center;">
        <h1 style="color:var(--blue)">CLIENT LOGIN</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Any Password">
        <button class="main-btn publish-btn" onclick="checkLogin()">LOGIN</button>
    </div>

    <div id="admin-panel" class="container" style="display:none;">
        <h2 style="color:var(--gold)">SITE EDITOR</h2>

        <div class="input-group"><input type="text" id="edit-title" placeholder="Title"><button class="del-btn" onclick="clearBox('edit-title')">✕</button></div>
        <div class="input-group"><input type="text" id="edit-image" placeholder="Image Link"><button class="del-btn" onclick="clearBox('edit-image')">✕</button></div>
        <div class="input-group"><input type="text" id="edit-video" placeholder="Video Link"><button class="del-btn" onclick="clearBox('edit-video')">✕</button></div>
        <div class="input-group"><textarea id="edit-text" rows="3" placeholder="Text"></textarea><button class="del-btn" onclick="clearBox('edit-text')">✕</button></div>

        <button class="main-btn publish-btn" onclick="publishSite()">🚀 UPLOAD & PUBLISH</button>

        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="status-text"></div>

        <button class="main-btn view-btn" id="view-live-btn" onclick="window.open('index.html', '_blank')">🌍 VIEW LIVE WEBSITE</button>

        <button class="main-btn logout-btn" onclick="logoutAndDelete()">LOGOUT & DELETE DATA</button>
    </div>

</body>
</html>
