  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Master Control | Love-Music-AI</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBhht8EBXClI_eBWADCKHPGCywnir1bRiE",
          authDomain: "bluepanda-ai.firebaseapp.com",
          projectId: "bluepanda-ai",
          storageBucket: "bluepanda-ai.firebasestorage.app",
          messagingSenderId: "778830127801",
          appId: "1:778830127801:web:4ac3d72ae7e2ae6fe33168"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- PASSWORD LOGIC ---
        // Your client can enter ANY password they want during login 
        // as long as it's not empty!
        window.checkLogin = function() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            if(email.includes("@") && pass.length >= 4) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                alert("Please enter a valid email and a password (min 4 chars).");
            }
        };

        // --- DELETE & LOGOUT LOGIC ---
        window.logoutAndDelete = async function() {
            if(confirm("LOGOUT WARNING: This will DELETE all public posts and reset the site. Continue?")) {
                try {
                    await deleteDoc(doc(db, "clientSites", "mainSite"));
                    alert("System Purged. All data deleted from public view.");
                    location.reload(); // Returns to login screen
                } catch (e) {
                    alert("Error during purge: " + e.message);
                }
            }
        };

        // --- PUBLISH LOGIC ---
        window.publishSite = async function() {
            const data = {
                title: document.getElementById('edit-title').value,
                image: document.getElementById('edit-image').value,
                video: document.getElementById('edit-video').value,
                text: document.getElementById('edit-text').value,
            };

            await setDoc(doc(db, "clientSites", "mainSite"), data);
            alert("🚀 SITE UPDATED AND PUBLISHED!");
        };

        // --- CLEAR BOX LOGIC ---
        window.clearBox = function(id) {
            document.getElementById(id).value = "";
        };
    </script>
    <style>
        :root { --blue: #38bdf8; --gold: #fbbf24; --dark: #020617; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 2px solid var(--blue); border-radius: 20px; padding: 20px; box-shadow: 0 0 15px var(--blue); }
        .input-group { position: relative; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; background: #111827; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        .del-btn { position: absolute; right: 10px; top: 12px; color: #ef4444; border: none; background: none; cursor: pointer; font-weight: bold; }
        .main-btn { width: 100%; padding: 15px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .logout-btn { background: #dc2626; color: white; margin-top: 30px; }
        .publish-btn { background: var(--gold); color: black; }
        #login-screen { text-align: center; margin-top: 10vh; }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <h1 style="color:var(--blue)">CLIENT ACCESS</h1>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Choose Your Password">
        <button class="main-btn publish-btn" onclick="checkLogin()">START EDITING</button>
    </div>

    <div id="admin-panel" class="container" style="display:none;">
        <h2 style="color:var(--gold)">SITE EDITOR</h2>

        <div class="input-group">
            <input type="text" id="edit-title" placeholder="Website Title">
            <button class="del-btn" onclick="clearBox('edit-title')">✕</button>
        </div>

        <div class="input-group">
            <input type="text" id="edit-image" placeholder="Picture URL (Link)">
            <button class="del-btn" onclick="clearBox('edit-image')">✕</button>
        </div>

        <div class="input-group">
            <input type="text" id="edit-video" placeholder="Video URL (YouTube/MP4 Link)">
            <button class="del-btn" onclick="clearBox('edit-video')">✕</button>
        </div>

        <div class="input-group">
            <textarea id="edit-text" rows="4" placeholder="Main Description Text"></textarea>
            <button class="del-btn" onclick="clearBox('edit-text')">✕</button>
        </div>

        <button class="main-btn publish-btn" onclick="publishSite()">🚀 UPLOAD & PUBLISH</button>
        <button class="main-btn logout-btn" onclick="logoutAndDelete()">⚠️ LOGOUT & DELETE ALL DATA</button>
    </div>

</body>
</html>
